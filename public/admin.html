<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VU Notice Admin</title>
    <style>
      :root {
        --bg: #0c1215;
        --card: #142126;
        --card-soft: #1a2b31;
        --accent: #39b9a9;
        --text: #e4eef2;
        --muted: #9eb0b8;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: radial-gradient(circle at top, #13252c, var(--bg));
        color: var(--text);
      }
      .wrap {
        max-width: 1020px;
        margin: 0 auto;
        padding: 20px;
      }
      .title {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      @media (min-width: 920px) {
        .grid { grid-template-columns: 1.2fr 1fr; }
      }
      .card {
        background: linear-gradient(135deg, var(--card), var(--card-soft));
        border: 1px solid #2d464f;
        border-radius: 16px;
        padding: 14px;
      }
      .label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 8px 0 6px;
      }
      input, select, textarea, button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #34515c;
        background: #102026;
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }
      textarea { min-height: 110px; resize: vertical; }
      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      @media (min-width: 680px) {
        .row.three { grid-template-columns: repeat(3, 1fr); }
        .row.two { grid-template-columns: repeat(2, 1fr); }
      }
      button {
        cursor: pointer;
        background: linear-gradient(135deg, #2ca997, var(--accent));
        color: #072623;
        font-weight: 800;
      }
      .btn-secondary {
        background: #1d3138;
        color: var(--text);
      }
      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
        background: #1a2f36;
        color: var(--muted);
        font-size: 13px;
        white-space: pre-wrap;
      }
      .danger { color: var(--danger); }
      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
        max-height: 580px;
        overflow: auto;
      }
      .item {
        background: #0f1c21;
        border: 1px solid #27414a;
        border-radius: 12px;
        padding: 10px;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 6px;
      }
      .chip {
        font-size: 11px;
        border-radius: 999px;
        padding: 4px 8px;
        background: #16323a;
        color: #b9d4dc;
      }
      a { color: #8adcf7; }
      .notice-text { white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
      .notice-text a { word-break: break-all; }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }
      .muted { color: var(--muted); font-size: 13px; }
      .row-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .row-actions button {
        width: auto;
        padding: 6px 12px;
        font-size: 12.5px;
        font-weight: 700;
      }
      .btn-edit { background: #1d3138; color: var(--text); }
      .btn-delete { background: #3a1d22; color: var(--danger); border-color: #5a2a30; }
      .btn-pin { background: #2a2718; color: var(--accent); border-color: #4a3f1a; }
      .row-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .row-head input[type=checkbox] { width: auto; margin-top: 4px; }
      .pin-badge {
        background: linear-gradient(135deg, #f0be5c, #d8a23a);
        color: #2a1d00;
        font-weight: 800;
        font-size: 10px;
        padding: 3px 7px;
        border-radius: 999px;
        margin-left: 4px;
      }
      .search-row {
        display: flex;
        gap: 8px;
        margin: 10px 0;
        flex-wrap: wrap;
      }
      .search-row input { flex: 1; min-width: 140px; }
      .search-row select { width: auto; min-width: 130px; }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin: 8px 0;
      }
      .toolbar button { width: auto; padding: 7px 12px; font-size: 12.5px; }
      .toolbar .count { color: var(--muted); font-size: 12.5px; margin-left: auto; }
      .modal-backdrop {
        position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        display: flex; align-items: center; justify-content: center;
        z-index: 50; padding: 16px;
      }
      .modal {
        background: var(--card);
        border: 1px solid #2d464f;
        border-radius: 14px;
        padding: 16px;
        max-width: 520px; width: 100%;
        max-height: 88vh; overflow: auto;
      }
      .modal h4 { margin: 0 0 10px; }
      .modal .close { margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <h1 class="title">VU Notice Admin Dashboard</h1>
        <div class="muted">Route: <code>/admin</code></div>
      </div>

      <div class="grid">
        <section class="card">
          <h3>Send Notice</h3>

          <label class="label">Backend URL</label>
          <input id="baseUrl" value="" placeholder="Auto: current domain" />

          <label class="label">Admin Token</label>
          <input id="adminToken" type="password" placeholder="x-admin-token" />

          <label class="label">Sender Name</label>
          <input id="senderName" value="VU Admin" />

          <div class="row three">
            <div>
              <label class="label">Notice Section</label>
              <select id="section"></select>
            </div>
            <div>
              <label class="label">Target Group</label>
              <select id="targetGroup"></select>
            </div>
            <div>
              <label class="label">Media Type</label>
              <select id="mediaType">
                <option value="">Auto</option>
                <option value="image">Image</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
                <option value="file">File</option>
              </select>
            </div>
          </div>

          <label class="label">Message Text</label>
          <textarea id="text" placeholder="Write your notice message..."></textarea>

          <label class="label">Upload Media (optional)</label>
          <input id="mediaFile" type="file" />

          <div class="row two" style="margin-top: 12px;">
            <button id="sendBtn">Send Notice</button>
            <button id="refreshBtn" class="btn-secondary" type="button">Refresh Messages</button>
          </div>

          <div id="status" class="status">Ready</div>
        </section>

        <section class="card">
          <h3>Recent Notices</h3>

          <div class="search-row">
            <input id="searchBox" placeholder="Search notices by text..." />
            <select id="filterSection"></select>
            <select id="filterGroup"></select>
            <button id="searchBtn" class="btn-secondary" type="button" style="width:auto;padding:10px 14px;">Search</button>
          </div>

          <div class="toolbar">
            <button id="refreshBtn" class="btn-secondary" type="button" style="width:auto;">Refresh</button>
            <button id="selectAllBtn" class="btn-secondary" type="button" style="width:auto;">Select all</button>
            <button id="deleteSelectedBtn" class="btn-delete" type="button" style="width:auto;">Delete selected</button>
            <button id="loadMoreBtn" class="btn-secondary" type="button" style="width:auto;display:none;">Load older</button>
            <span id="resultCount" class="count"></span>
          </div>

          <div id="messages" class="list"></div>
        </section>
      </div>
    </div>

    <div id="editModal" class="modal-backdrop" style="display:none;">
      <div class="modal">
        <h4 id="editModalTitle">Edit Notice</h4>
        <label class="label">Message Text</label>
        <textarea id="editText"></textarea>
        <div class="row three" style="margin-top:8px;">
          <div>
            <label class="label">Section</label>
            <select id="editSection"></select>
          </div>
          <div>
            <label class="label">Target Group</label>
            <select id="editGroup"></select>
          </div>
          <div>
            <label class="label">Sender Name</label>
            <input id="editSender" />
          </div>
        </div>
        <label class="label" style="margin-top:8px;">Media URL</label>
        <input id="editMediaUrl" placeholder="Leave empty to remove media" />
        <label class="label">Replace Media (optional)</label>
        <input id="editMediaFile" type="file" />
        <label class="label" style="margin-top:8px;">
          <input type="checkbox" id="editPinned" style="width:auto;margin-right:6px;vertical-align:middle;" />
          Pinned (shows at top of feed)
        </label>
        <div class="row-actions close">
          <button id="editSaveBtn">Save changes</button>
          <button id="editCancelBtn" class="btn-secondary" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      const els = {
        baseUrl: document.getElementById('baseUrl'),
        adminToken: document.getElementById('adminToken'),
        senderName: document.getElementById('senderName'),
        section: document.getElementById('section'),
        targetGroup: document.getElementById('targetGroup'),
        mediaType: document.getElementById('mediaType'),
        text: document.getElementById('text'),
        mediaFile: document.getElementById('mediaFile'),
        sendBtn: document.getElementById('sendBtn'),
        refreshBtn: document.getElementById('refreshBtn'),
        status: document.getElementById('status'),
        messages: document.getElementById('messages'),
        searchBox: document.getElementById('searchBox'),
        filterSection: document.getElementById('filterSection'),
        filterGroup: document.getElementById('filterGroup'),
        searchBtn: document.getElementById('searchBtn'),
        selectAllBtn: document.getElementById('selectAllBtn'),
        deleteSelectedBtn: document.getElementById('deleteSelectedBtn'),
        loadMoreBtn: document.getElementById('loadMoreBtn'),
        resultCount: document.getElementById('resultCount'),
        editModal: document.getElementById('editModal'),
        editModalTitle: document.getElementById('editModalTitle'),
        editText: document.getElementById('editText'),
        editSection: document.getElementById('editSection'),
        editGroup: document.getElementById('editGroup'),
        editSender: document.getElementById('editSender'),
        editMediaUrl: document.getElementById('editMediaUrl'),
        editMediaFile: document.getElementById('editMediaFile'),
        editPinned: document.getElementById('editPinned'),
        editSaveBtn: document.getElementById('editSaveBtn'),
        editCancelBtn: document.getElementById('editCancelBtn'),
      };

      const storage = {
        get(k, fallback = '') { return localStorage.getItem(`vu-admin-${k}`) || fallback; },
        set(k, v) { localStorage.setItem(`vu-admin-${k}`, v || ''); },
      };

      const state = {
        notices: [],
        loadedCount: 0,
        totalCount: null,
        nextBefore: null,
        hasMore: false,
        selected: new Set(),
        editingId: null,
      };

      const defaultBaseUrl = window.location?.origin || 'https://virtual-massaage-admin.vercel.app';

      function baseUrl() {
        return (els.baseUrl.value || defaultBaseUrl).replace(/\/+$/, '');
      }

      function setStatus(text, isError = false) {
        els.status.textContent = text;
        els.status.classList.toggle('danger', Boolean(isError));
      }

      function addOptions(select, items) {
        select.innerHTML = '';
        for (const item of items) {
          const o = document.createElement('option');
          o.value = item.key;
          o.textContent = item.label;
          select.appendChild(o);
        }
      }

      async function api(path, options = {}) {
        const url = `${baseUrl()}${path}`;
        const headers = { ...(options.headers || {}) };
        const token = els.adminToken.value.trim();
        if (token) headers['x-admin-token'] = token;

        const response = await fetch(url, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `Request failed (${response.status})`);
        }
        return data;
      }

      async function loadMeta() {
        const meta = await api('/api/meta', { headers: { accept: 'application/json' } });
        addOptions(els.section, meta.sections);
        addOptions(els.targetGroup, meta.groups);
        addOptions(els.filterSection, meta.sections);
        addOptions(els.filterGroup, meta.groups);
        addOptions(els.editSection, meta.sections);
        addOptions(els.editGroup, meta.groups);

        els.section.value = storage.get('section', 'general');
        els.targetGroup.value = storage.get('targetGroup', 'all');
        els.filterSection.value = storage.get('filterSection', 'all');
        els.filterGroup.value = storage.get('filterGroup', 'all');
      }

      function formatDate(iso) {
        try { return new Date(iso).toLocaleString(); } catch { return iso; }
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function linkify(text) {
        const escaped = escapeHtml(text);
        return escaped.replace(/(https?:\/\/[^\s<>"')]+)/gi, (url) => {
          const safe = escapeHtml(url);
          return `<a href="${safe}" target="_blank" rel="noopener">${safe}</a>`;
        });
      }

      function mediaBadge(mediaType) {
        if (!mediaType || mediaType === 'text') return '';
        const icon = {
          image: '🖼️',
          video: '🎬',
          audio: '🎵',
          file: '📎',
        }[mediaType] || '📎';
        return `<span class="chip">${icon} ${mediaType.toUpperCase()}</span>`;
      }

      function renderMessages() {
        const messages = state.notices;
        els.messages.innerHTML = '';
        if (!messages.length) {
          const item = document.createElement('div');
          item.className = 'item';
          item.textContent = 'No notices match the current filters.';
          els.messages.appendChild(item);
        }

        for (const msg of messages) {
          const item = document.createElement('div');
          item.className = 'item';

          const mediaHtml = msg.mediaUrl
            ? `<div style="margin-top:8px;"><a href="${escapeHtml(msg.mediaUrl)}" target="_blank" rel="noopener">Open ${escapeHtml(msg.mediaType) || 'media'}</a></div>`
            : '';

          const pinBadge = msg.pinned ? '<span class="pin-badge">PINNED</span>' : '';
          const checked = state.selected.has(msg.id) ? 'checked' : '';

          item.innerHTML = `
            <div class="row-head">
              <input type="checkbox" class="msg-select" data-id="${escapeHtml(msg.id)}" ${checked} />
              <div style="flex:1;">
                <div class="meta">
                  <span class="chip">${escapeHtml(msg.section || 'general')}</span>
                  <span class="chip">${escapeHtml(msg.targetGroup || 'all')}</span>
                  <span class="chip">${escapeHtml(msg.senderName || 'Admin')}</span>
                  ${mediaBadge(msg.mediaType)}
                  ${pinBadge}
                </div>
                <div class="notice-text">${linkify(msg.text || '')}</div>
                <div class="muted" style="margin-top:6px;font-size:11.5px;">${escapeHtml(formatDate(msg.createdAt))}</div>
                ${mediaHtml}
                <div class="row-actions">
                  <button class="btn-edit" data-action="edit" data-id="${escapeHtml(msg.id)}">Edit</button>
                  <button class="btn-pin" data-action="pin" data-id="${escapeHtml(msg.id)}">${msg.pinned ? 'Unpin' : 'Pin'}</button>
                  <button class="btn-delete" data-action="delete" data-id="${escapeHtml(msg.id)}">Delete</button>
                </div>
              </div>
            </div>
          `;

          els.messages.appendChild(item);
        }

        els.resultCount.textContent = state.totalCount != null
          ? `Showing ${messages.length} of ${state.totalCount}`
          : `${messages.length} loaded`;
        els.loadMoreBtn.style.display = state.hasMore ? '' : 'none';
      }

      function currentQuery() {
        const params = new URLSearchParams();
        const section = els.filterSection.value || 'all';
        const group = els.filterGroup.value || 'all';
        const search = els.searchBox.value.trim();
        if (section !== 'all') params.set('section', section);
        if (group !== 'all') params.set('group', group);
        if (search) params.set('search', search);
        return params;
      }

      async function loadMessages() {
        const params = currentQuery();
        params.set('limit', '20');
        params.set('total', 'true');
        try {
          const data = await api(`/api/messages?${params.toString()}`, {
            headers: { accept: 'application/json' },
          });
          state.notices = data.messages || [];
          state.nextBefore = data.nextBefore;
          state.hasMore = Boolean(data.hasMore);
          state.totalCount = data.total ?? null;
          state.selected.clear();
          renderMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      async function loadOlder() {
        if (!state.hasMore || !state.nextBefore) return;
        const params = currentQuery();
        params.set('limit', '20');
        params.set('before', state.nextBefore);
        try {
          const data = await api(`/api/messages?${params.toString()}`, {
            headers: { accept: 'application/json' },
          });
          const older = data.messages || [];
          const seen = new Set(state.notices.map((m) => m.id));
          for (const m of older) {
            if (!seen.has(m.id)) state.notices.push(m);
          }
          state.nextBefore = data.nextBefore;
          state.hasMore = Boolean(data.hasMore);
          renderMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      async function uploadMediaIfAny() {
        const file = els.mediaFile.files?.[0];
        if (!file) return { mediaUrl: '', mediaType: '' };
        return uploadMediaFile(file);
      }

      async function uploadMediaFile(file) {
        const form = new FormData();
        form.append('media', file);

        const res = await fetch(`${baseUrl()}/api/admin/upload`, {
          method: 'POST',
          headers: { 'x-admin-token': els.adminToken.value.trim() },
          body: form,
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `Upload failed (${res.status})`);
        }
        return { mediaUrl: data.mediaUrl || '', mediaType: data.mediaType || '' };
      }

      async function sendNotice() {
        setStatus('Sending notice...');
        try {
          const uploaded = await uploadMediaIfAny();
          const forcedType = els.mediaType.value.trim();

          const payload = {
            text: els.text.value.trim(),
            senderName: els.senderName.value.trim() || 'VU Admin',
            section: els.section.value || 'general',
            targetGroup: els.targetGroup.value || 'all',
            mediaUrl: uploaded.mediaUrl,
            mediaType: forcedType || uploaded.mediaType,
            pinned: false,
          };

          await api('/api/admin/messages', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload),
          });

          els.text.value = '';
          els.mediaFile.value = '';
          setStatus('Notice sent successfully ✅');
          await loadMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      async function deleteMessage(id) {
        const msg = state.notices.find((m) => m.id === id);
        const preview = msg ? `"${(msg.text || '').slice(0, 60)}"` : 'this notice';
        if (!confirm(`Delete ${preview}? This cannot be undone.`)) return;
        try {
          await api(`/api/admin/messages/${id}`, { method: 'DELETE' });
          setStatus('Notice deleted 🗑️');
          await loadMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      async function togglePin(id) {
        const msg = state.notices.find((m) => m.id === id);
        if (!msg) return;
        try {
          await api(`/api/admin/messages/${id}`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ pinned: !msg.pinned }),
          });
          setStatus(msg.pinned ? 'Notice unpinned' : 'Notice pinned 📌');
          await loadMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      async function deleteSelected() {
        if (!state.selected.size) {
          setStatus('Select notices first using the checkboxes.');
          return;
        }
        const ids = Array.from(state.selected);
        if (!confirm(`Delete ${ids.length} notice(s)? This cannot be undone.`)) return;
        try {
          const data = await api('/api/admin/messages', {
            method: 'DELETE',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ ids }),
          });
          setStatus(`Deleted ${data.deleted} notice(s), removed ${data.mediaRemoved} media file(s) 🗑️`);
          await loadMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      function openEditModal(id) {
        const msg = state.notices.find((m) => m.id === id);
        if (!msg) return;
        state.editingId = id;
        els.editModalTitle.textContent = 'Edit Notice';
        els.editText.value = msg.text || '';
        els.editSection.value = msg.section || 'general';
        els.editGroup.value = msg.targetGroup || 'all';
        els.editSender.value = msg.senderName || 'Admin';
        els.editMediaUrl.value = msg.mediaUrl || '';
        els.editMediaFile.value = '';
        els.editPinned.checked = Boolean(msg.pinned);
        els.editModal.style.display = 'flex';
      }

      function closeEditModal() {
        state.editingId = null;
        els.editModal.style.display = 'none';
      }

      async function saveEdit() {
        if (!state.editingId) return;
        const id = state.editingId;
        const payload = {
          text: els.editText.value.trim(),
          section: els.editSection.value || 'general',
          targetGroup: els.editGroup.value || 'all',
          senderName: els.editSender.value.trim() || 'Admin',
          mediaUrl: els.editMediaUrl.value.trim(),
          pinned: els.editPinned.checked,
        };

        const file = els.editMediaFile.files?.[0];
        if (file) {
          try {
            const uploaded = await uploadMediaFile(file);
            payload.mediaUrl = uploaded.mediaUrl;
          } catch (error) {
            setStatus(error.message || String(error), true);
            return;
          }
        }

        try {
          await api(`/api/admin/messages/${id}`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(payload),
          });
          setStatus('Notice updated ✅');
          closeEditModal();
          await loadMessages();
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      function bindPersistence() {
        const mapping = [
          ['baseUrl', els.baseUrl],
          ['adminToken', els.adminToken],
          ['senderName', els.senderName],
          ['section', els.section],
          ['targetGroup', els.targetGroup],
          ['filterSection', els.filterSection],
          ['filterGroup', els.filterGroup],
        ];

        for (const [key, el] of mapping) {
          const value = storage.get(key);
          if (value) el.value = value;
          el.addEventListener('change', () => storage.set(key, el.value));
          el.addEventListener('input', () => storage.set(key, el.value));
        }
      }

      async function init() {
        try {
          bindPersistence();
          await loadMeta();
          await loadMessages();
          setStatus('Connected. Ready to send notices.');
        } catch (error) {
          setStatus(error.message || String(error), true);
        }
      }

      els.sendBtn.addEventListener('click', sendNotice);
      els.refreshBtn.addEventListener('click', () => loadMessages().catch((e) => setStatus(e.message, true)));
      els.searchBtn.addEventListener('click', () => loadMessages().catch((e) => setStatus(e.message, true)));
      els.searchBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadMessages().catch((err) => setStatus(err.message, true));
      });
      els.filterSection.addEventListener('change', () => loadMessages().catch((e) => setStatus(e.message, true)));
      els.filterGroup.addEventListener('change', () => loadMessages().catch((e) => setStatus(e.message, true)));
      els.loadMoreBtn.addEventListener('click', loadOlder);
      els.selectAllBtn.addEventListener('click', () => {
        if (state.selected.size === state.notices.length) {
          state.selected.clear();
        } else {
          state.notices.forEach((m) => state.selected.add(m.id));
        }
        renderMessages();
      });
      els.deleteSelectedBtn.addEventListener('click', deleteSelected);
      els.editSaveBtn.addEventListener('click', saveEdit);
      els.editCancelBtn.addEventListener('click', closeEditModal);
      els.editModal.addEventListener('click', (e) => {
        if (e.target === els.editModal) closeEditModal();
      });

      els.messages.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-action]');
        if (!btn) return;
        const id = btn.dataset.id;
        const action = btn.dataset.action;
        if (action === 'edit') openEditModal(id);
        else if (action === 'delete') deleteMessage(id);
        else if (action === 'pin') togglePin(id);
      });

      els.messages.addEventListener('change', (e) => {
        const box = e.target.closest('input.msg-select');
        if (!box) return;
        const id = box.dataset.id;
        if (box.checked) state.selected.add(id);
        else state.selected.delete(id);
      });

      init();
    </script>
  </body>
</html>
